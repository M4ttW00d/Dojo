<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Application received — {{ org.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5 text-center" style="max-width: 480px;">
    <h2 class="fw-bold mb-1">{{ org.name }}</h2>
    <p class="text-muted mb-4">Membership application</p>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
            <i class="bi bi-check-circle-fill text-success display-4 d-block mb-3"></i>
            <h4 class="mb-2">Application received</h4>
            <p class="text-muted mb-0">Thank you! We'll review your application and be in touch soon.</p>
            {% if org.email %}
            <p class="text-muted small mt-2">Any questions? <a href="mailto:{{ org.email }}">{{ org.email }}</a></p>
            {% endif %}
        </div>
    </div>
</div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
