<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join {{ org.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; }</style>
</head>
<body>
<div class="container py-5" style="max-width: 600px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold">{{ org.name }}</h2>
        <p class="text-muted">Membership application</p>
    </div>

    {% if errors %}
    <div class="alert alert-danger py-2">
        {% for e in errors %}<div class="small">{{ e }}</div>{% endfor %}
    </div>
    {% endif %}

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}

                <h6 class="mb-3">Member details</h6>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Full name <span class="text-danger">*</span></label>
                        <input type="text" name="name" value="{{ data.name|default:'' }}" class="form-control" required autofocus>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label small fw-semibold">Date of birth</label>
                        <input type="date" name="date_of_birth" value="{{ data.date_of_birth|default:'' }}" class="form-control">
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label small fw-semibold">Phone</label>
                        <input type="text" name="phone" value="{{ data.phone|default:'' }}" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Email</label>
                        <input type="email" name="email" value="{{ data.email|default:'' }}" class="form-control">
                    </div>
                </div>

                <h6 class="mb-1">Parent / guardian details</h6>
                <p class="text-muted small mb-3">Complete this section if the member is a child.</p>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Guardian full name</label>
                        <input type="text" name="guardian_name" value="{{ data.guardian_name|default:'' }}" class="form-control">
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label small fw-semibold">Guardian email</label>
                        <input type="email" name="guardian_email" value="{{ data.guardian_email|default:'' }}" class="form-control">
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label small fw-semibold">Guardian phone</label>
                        <input type="text" name="guardian_phone" value="{{ data.guardian_phone|default:'' }}" class="form-control">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold">Anything else we should know?</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Medical conditions, previous experience, questions…">{{ data.notes|default:'' }}</textarea>
                </div>

                <button type="submit" class="btn btn-dark w-100">Submit application</button>
            </form>
        </div>
    </div>

    {% if org.email %}
    <p class="text-center text-muted small mt-4">Questions? Email us at <a href="mailto:{{ org.email }}">{{ org.email }}</a></p>
    {% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
