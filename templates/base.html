<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dojo{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dojo-sidebar: #1E3A5F;
            --dojo-sidebar-dark: #152d4a;
            --dojo-accent: #2563EB;
            --dojo-accent-hover: #1d4ed8;
            --dojo-body-bg: #F1F5F9;
            --dojo-card-bg: #ffffff;
            --dojo-text: #0f172a;
            --dojo-muted: #64748b;
            --dojo-border: #e2e8f0;
            --dojo-radius: 10px;
            --dojo-shadow: 0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
            --dojo-shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.05);
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 15px; color: var(--dojo-text); background: var(--dojo-body-bg); }
        h1,h2,h3,h4,h5,h6 { font-weight: 600; }
        .card { border-radius: var(--dojo-radius) !important; border: 1px solid var(--dojo-border) !important; box-shadow: var(--dojo-shadow) !important; }
        .btn { border-radius: 7px !important; font-weight: 500; font-size: 0.875rem; }
        .btn-primary { background: var(--dojo-accent) !important; border-color: var(--dojo-accent) !important; }
        .btn-primary:hover { background: var(--dojo-accent-hover) !important; border-color: var(--dojo-accent-hover) !important; }
        .btn-dark { background: var(--dojo-sidebar) !important; border-color: var(--dojo-sidebar) !important; }
        .btn-dark:hover { background: var(--dojo-sidebar-dark) !important; border-color: var(--dojo-sidebar-dark) !important; }
        .badge { border-radius: 5px !important; font-weight: 500; }
        .table { font-size: 0.875rem; }
        .table th { font-weight: 600; color: var(--dojo-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: .05em; }
        .form-control, .form-select { border-radius: 7px !important; border-color: var(--dojo-border); font-size: 0.875rem; }
        .form-control:focus, .form-select:focus { border-color: var(--dojo-accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        .alert { border-radius: var(--dojo-radius) !important; }
        /* Mobile baseline */
        @media (max-width: 767px) {
            .card-header.d-flex { flex-wrap: wrap; gap: 8px !important; }
            .card-header.d-flex h6 { min-width: 0; }
            /* dl label/value pairs stack on mobile */
            dl.row dt, dl.row dd { float: none; width: 100%; max-width: 100%; padding: 0; margin: 0; }
            dl.row dd { color: #0f172a; padding-bottom: 10px; }
            dl.row dt { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .05em; padding-top: 6px; }
            dl.row dt:first-child { padding-top: 0; }
            /* Stat tiles on small screens */
            .col-sm-3 { flex: 0 0 50%; max-width: 50%; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block body %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
