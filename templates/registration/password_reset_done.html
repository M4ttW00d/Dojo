{% extends 'base.html' %}
{% block title %}Check your email — Dojo{% endblock %}
{% block body_class %}bg-dark{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="w-100 text-center" style="max-width: 380px;">
        <div class="mb-4">
            <h2 class="text-white fw-bold">Dojo</h2>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <i class="bi bi-envelope-check display-5 text-success d-block mb-3"></i>
                <h5 class="card-title mb-2">Check your email</h5>
                <p class="text-muted small mb-3">If an account exists for that address, a password reset link has been sent.</p>
                <a href="{% url 'login' %}" class="btn btn-dark w-100">Back to log in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
