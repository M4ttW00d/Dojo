{% extends 'base.html' %}
{% block title %}Reset password — Dojo{% endblock %}
{% block body_class %}bg-dark{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="w-100" style="max-width: 380px;">
        <div class="text-center mb-4">
            <h2 class="text-white fw-bold">Dojo</h2>
            <p class="text-secondary">Club management</p>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h5 class="card-title mb-1">Reset password</h5>
                <p class="text-muted small mb-4">Enter your email address and we'll send you a reset link.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Email address</label>
                        <input type="email" name="email" class="form-control" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Send reset link</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-muted small">Back to log in</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
